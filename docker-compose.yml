services:
  router:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - postgres
    ports:
      - "127.0.0.1:${PORT:-3000}:3000"

  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-iirest_router}
      POSTGRES_USER: ${POSTGRES_USER:-iirest}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    expose:
      - "5432"

  redis:
    image: redis:7
    profiles:
      - redis
    restart: unless-stopped
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
